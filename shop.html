<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse the marketplace — premium graded TCG singles, key issue comics, and collectibles. Filter by game, publisher, era, rarity, and grade.">
  <meta name="theme-color" content="#DC2626">
  <title>Shop — THE GEMNASIUM</title>
  
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/shop.css">

  <!-- Supabase & EmailJS -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@latest/dist/email.min.js"></script>
</head>
<body>
  <!-- ═══ Navigation ═══ -->
  <div id="navbar-root"></div>

  <main class="shop-page">
    <!-- ═══ Shop Header ═══ -->
    <div class="shop-header">
      <div class="container-wide">
        <div class="shop-header__inner">
          <div style="display:flex; align-items:center; gap:var(--space-4); flex-wrap:wrap;">
            <h1 class="shop-header__title">
              Marketplace
              <span class="shop-header__count" id="results-count"></span>
            </h1>
            
            <div class="category-toggle" id="category-toggle" style="flex-wrap: wrap; gap: var(--space-2);">
              <button class="category-toggle__btn active" data-category="all" onclick="setCategory('all')">
                All Artifacts
              </button>
              <button class="category-toggle__btn" data-category="sports" onclick="setCategory('sports')">
                Sports Cards
              </button>
              <button class="category-toggle__btn" data-category="tcg" onclick="setCategory('tcg')">
                TCG
              </button>
              <button class="category-toggle__btn" data-category="comics" onclick="setCategory('comics')">
                Comics & Marvel
              </button>
              <button class="category-toggle__btn" data-category="art" onclick="setCategory('art')">
                Fine Art
              </button>
              <button class="category-toggle__btn" data-category="other" onclick="setCategory('other')">
                Other Gems
              </button>
            </div>
          </div>
          
          <div style="display:flex; align-items:center; gap: var(--space-3); flex-wrap:wrap;">
            <button class="shop-filter-toggle" id="filter-toggle-btn" onclick="toggleMobileSidebar()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
              Filters
            </button>
            <div class="shop-search">
              <div class="shop-search__icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              </div>
              <input type="search" class="shop-search__input" id="search-input" placeholder="Search cards, comics, sets..." autocomplete="off">
              <button class="shop-search__clear" id="search-clear" onclick="clearSearch()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Mobile sidebar overlay -->
    <div class="shop-sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>

    <!-- ═══ Shop Content ═══ -->
    <div class="shop-content container-wide">
      <!-- ─── Filter Sidebar ─── -->
      <aside class="shop-sidebar" id="shop-sidebar">
        <button class="shop-sidebar__close-mobile" onclick="toggleMobileSidebar()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        
        <div class="shop-sidebar__header">
          <div class="shop-sidebar__title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Filters
          </div>
          <button class="shop-sidebar__clear" onclick="clearAllFilters()">Clear All</button>
        </div>
        
        <!-- Dynamic filter groups rendered by JS -->
        <div id="filter-groups"></div>
      </aside>
      
      <!-- ─── Product Grid ─── -->
      <div class="shop-grid-wrap">
        <div class="shop-grid-toolbar">
          <div class="shop-grid-toolbar__info" id="grid-info">
            Showing <strong>0</strong> items
          </div>
          <div class="shop-sort">
            <span class="shop-sort__label">Sort by</span>
            <select class="shop-sort__select" id="sort-select" onchange="window.applySort()">
              <option value="featured">Featured</option>
              <option value="price-asc">Price: Low → High</option>
              <option value="price-desc">Price: High → Low</option>
              <option value="name-asc">Name: A → Z</option>
              <option value="grade-desc">Grade: High → Low</option>
            </select>
          </div>
        </div>
        
        <div class="active-filters" id="active-filters"></div>
        
        <div class="shop-grid" id="product-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </main>

  <!-- ═══ Footer ═══ -->
  <div id="footer-root"></div>

  <!-- ═══ Cart Drawer ═══ -->
  <div id="cart-root"></div>

  <script src="js/bundle-shop-v4.js"></script>
</body>
</html>
